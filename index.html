<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>База ЖК</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--tg-theme-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #000);
            padding: 16px;
        }
        .header { margin-bottom: 20px; }
        .header h1 { font-size: 24px; margin-bottom: 15px; }
        .search-input {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            background: white;
            margin-bottom: 15px;
        }
        .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
        .filter-btn {
            padding: 8px 16px;
            border: 2px solid #3390ec;
            border-radius: 20px;
            background: white;
            color: #3390ec;
            font-size: 14px;
            cursor: pointer;
        }
        .filter-btn.active { background: #3390ec; color: white; }
        .results-count { color: #999; font-size: 14px; margin-bottom: 15px; }
        .card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .project-name { font-size: 18px; font-weight: bold; margin-bottom: 5px; }
        .developer { color: #666; font-size: 14px; margin-bottom: 12px; }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }
        .info-row:last-child { border-bottom: none; }
        .info-label { color: #999; }
        .info-value { font-weight: 500; }
        .commissions { display: flex; gap: 8px; margin-top: 12px; }
        .comm-box {
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
        }
        .comm-input { background: #ffebee; color: #c62828; }
        .comm-output { background: #e8f5e9; color: #2e7d32; }
        .site-link { color: #3390ec; text-decoration: none; }
        .loading, .no-results { text-align: center; padding: 40px; color: #999; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏢 База проектов</h1>
        <input type="text" class="search-input" id="searchInput" placeholder="Поиск по ЖК, проекту, застройщику...">
        <div class="filters">
            <button class="filter-btn active" data-filter="all">Все</button>
            <button class="filter-btn" data-filter="Квартиры">Квартиры</button>
            <button class="filter-btn" data-filter="Паркинг">Паркинг</button>
            <button class="filter-btn" data-filter="Коммерция">Коммерция</button>
        </div>
    </div>
    
    <div class="results-count" id="resultsCount"></div>
    <div id="results"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRUVrU7_i_T3IokW-AawRbUh6bnvDRB4jqsFFcY3eMMdgpy6pEboe_4lv3HkenrKmn2PEchRLhvxjBs/pub?gid=1978136413&single=true&output=csv';
        
        let allData = [];
        let currentFilter = 'all';
        
        async function loadData() {
            try {
                const response = await fetch(SHEET_URL);
                const csvText = await response.text();
                parseCSV(csvText);
            } catch (error) {
                document.getElementById('results').innerHTML = '<div class="no-results">⚠️ Ошибка загрузки</div>';
            }
        }
        
        function parseCSV(text) {
            const lines = text.split('\n').map(line => line.trim()).filter(line => line);
            
            if (lines.length < 4) return;
            
            const headerParts = [];
            for (let i = 0; i < 3; i++) {
                headerParts.push(parseLine(lines[i]));
            }
            
            const maxCols = Math.max(...headerParts.map(p => p.length));
            const headers = [];
            for (let i = 0; i < maxCols; i++) {
                let header = '';
                for (let j = 0; j < 3; j++) {
                    if (headerParts[j][i]) {
                        header += (header ? ' ' : '') + headerParts[j][i];
                    }
                }
                headers.push(header.trim().replace(/"/g, ''));
            }
            
            allData = [];
            for (let i = 3; i < lines.length; i++) {
                const values = parseLine(lines[i]);
                
                const row = {
                    поставщик: values[0] || '',
                    застройщик: values[1] || '',
                    проект: values[2] || '',
                    сайт: values[3] || '',
                    город: values[4] || '',
                    тип: values[5] || '',
                    повышайка: values[6] || '',
                    входОт: values[7] || '',
                    входДо: values[8] || '',
                    исходОт: values[9] || '',
                    исходДо: values[10] || ''
                };
                
                if (row.проект || row.застройщик || row.поставщик) {
                    allData.push(row);
                }
            }
            
            renderResults(allData);
        }
        
        function parseLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current.trim());
            return result;
        }
        
        function filterData() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            
            return allData.filter(row => {
                const text = `${row.проект} ${row.застройщик} ${row.поставщик} ${row.город} ${row.тип}`.toLowerCase();
                if (!text.includes(term)) return false;
                
                if (currentFilter === 'all') return true;
                const type = row.тип.toLowerCase();
                if (currentFilter === 'Квартиры') return type.includes('квартир');
                if (currentFilter === 'Паркинг') return type.includes('паркинг');
                if (currentFilter === 'Коммерция') return type.includes('коммерц');
                return true;
            });
        }
        
        function renderResults(data) {
            const container = document.getElementById('results');
            document.getElementById('resultsCount').textContent = `Найдено: ${data.length}`;
            
            if (data.length === 0) {
                container.innerHTML = '<div class="no-results">Ничего не найдено</div>';
                return;
            }
            
            container.innerHTML = data.map(row => {
                const project = row.проект || '—';
                const developer = row.застройщик || row.поставщик || '—';
                const city = row.город || '—';
                const type = row.тип || '—';
                const site = row.сайт || '';
                
                // Просто берем значение из первой колонки (там уже есть диапазон если нужен)
                const inputComm = row.входОт || '—';
                const outputComm = row.исходОт || '—';
                
                return `
                    <div class="card">
                        <div class="project-name">${project}</div>
                        <div class="developer">${developer}</div>
                        <div class="info-row">
                            <span class="info-label">Город:</span>
                            <span class="info-value">${city}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Тип:</span>
                            <span class="info-value">${type}</span>
                        </div>
                        ${site ? `
                        <div class="info-row">
                            <span class="info-label">Сайт:</span>
                            <span class="info-value"><a href="${site}" class="site-link" target="_blank">Открыть</a></span>
                        </div>` : ''}
                        <div class="commissions">
                            <div class="comm-box comm-input">📥 Вход: ${inputComm}</div>
                            <div class="comm-box comm-output">📤 Исход: ${outputComm}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        document.getElementById('searchInput').addEventListener('input', () => {
            renderResults(filterData());
        });
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                renderResults(filterData());
            });
        });
        
        loadData();
    </script>
</body>
</html>
